name: Build macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build App
        run: pyinstaller build_mac.spec --noconfirm

      - name: Sign App
        run: |
          xattr -cr "dist/Live AreaTranslator.app"
          codesign --force --deep --sign - "dist/Live AreaTranslator.app"

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r -y "LiveAreaTranslator-macOS-${{ github.ref_name }}.zip" "Live AreaTranslator.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveAreaTranslator-macOS
          path: dist/LiveAreaTranslator-macOS-*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LiveAreaTranslator-macOS-*.zip
          generate_release_notes: true
